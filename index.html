<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDG 13: Carbon Offset Milestone Tracker</title>
  
  <!-- Google Fonts: Poppins (Headings) and Inter (Body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <!-- EMBEDDED STYLES (styles.css) -->
  <style>
    /* --- Design System & Color Palette --- */
    :root {
      --bg-color: #f4f7f5;          /* Soft, eco-friendly light gray/green */
      --card-bg: #ffffff;          /* Clean white for the main app container */
      --primary-green: #2d6a4f;    /* Deep earthy green for primary buttons and headers */
      --accent-green: #52b788;     /* Vibrant green for progress bars and success states */
      --text-dark: #2d3142;        /* Dark charcoal for readable body text */
      --text-muted: #6c757d;       /* Muted gray for secondary labels */
      --border-color: #e2e8f0;     /* Soft border lines */
      --danger-red: #d90429;       /* Red for the reset button */
    }

    /* --- Base Resets --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* --- Typography --- */
    h1, h2, h3 {
      font-family: 'Poppins', sans-serif;
      color: var(--primary-green);
    }

    /* --- App Layout Layout --- */
    .tracker-card {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(45, 106, 79, 0.08);
      border: 1px solid var(--border-color);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 1.6rem;
      margin-bottom: 5px;
    }

    .sdg-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: #e9f5ed;
      color: var(--primary-green);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    /* --- Form Controls --- */
    .input-section {
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    select {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background-color: #fff;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s ease;
      margin-bottom: 15px;
    }

    select:focus {
      border-color: var(--accent-green);
    }

    /* --- Buttons --- */
    button {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-add {
      background-color: var(--primary-green);
      color: #ffffff;
    }

    .btn-add:hover {
      background-color: #1b4332;
    }

    .btn-add:active {
      transform: scale(0.98);
    }

    .btn-reset {
      background-color: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 20px;
      padding: 6px;
    }

    .btn-reset:hover {
      color: var(--danger-red);
      text-decoration: underline;
    }

    /* --- Progress Section --- */
    .progress-section {
      background-color: #fafbfc;
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .stats-display {
      margin-bottom: 15px;
    }

    .total-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary-green);
      line-height: 1;
    }

    .total-unit {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .goal-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* --- Progress Bar --- */
    .progress-container {
      background-color: var(--border-color);
      border-radius: 10px;
      height: 16px;
      width: 100%;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      background-color: var(--accent-green);
      height: 100%;
      width: 0%; /* Managed dynamically by JavaScript */
      border-radius: 10px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>

  <!-- MAIN CONTAINER (index.html) -->
  <div class="tracker-card">
    
    <!-- Header -->
    <div class="header">
      <span class="sdg-badge">SDG 13: Climate Action</span>
      <h1>Carbon Offset Tracker</h1>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Log your daily changes to combat climate change</p>
    </div>

    <!-- User Input Section -->
    <div class="input-section">
      <label for="action-select">Choose a lifestyle action you completed:</label>
      <select id="action-select">
        <option value="1.5">Biked/Walked to school instead of driving (+1.5 kg)</option>
        <option value="0.8">Ate a fully plant-based meal (+0.8 kg)</option>
        <option value="0.6">Hung clothes to dry instead of using the dryer (+0.6 kg)</option>
        <option value="0.2">Used a reusable water bottle/bag all day (+0.2 kg)</option>
      </select>
      
      <button class="btn-add" id="add-btn">Add Action</button>
    </div>

    <!-- Progress Display Section -->
    <div class="progress-section">
      <div class="stats-display">
        <div class="total-number" id="total-saved">0.0</div>
        <div class="total-unit">kilograms of CO₂ saved</div>
        <div class="goal-text">Monthly Project Goal: <span id="goal-target">50</span> kg</div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <!-- Reset Feature -->
    <button class="btn-reset" id="reset-btn">Reset Tracker Data</button>

  </div>

  <!-- EMBEDDED LOGIC (script.js) -->
  <script>
    // 1. Identify and grab the necessary HTML Elements
    const actionSelect = document.getElementById('action-select');
    const addBtn = document.getElementById('add-btn');
    const totalSavedDisplay = document.getElementById('total-saved');
    const progressBar = document.getElementById('progress-bar');
    const resetBtn = document.getElementById('reset-btn');
    const goalTargetDisplay = document.getElementById('goal-target');

    // 2. Define application state variables
    let totalCO2Saved = 0.0;
    const monthlyGoal = 50.0; // Fixed project target in kg

    // Initialize the goal text dynamically from our variable
    goalTargetDisplay.textContent = monthlyGoal;

    // 3. Helper function to recalculate numbers and animate the progress bar
    function updateUI() {
      // Format the running total to always display precisely 1 decimal place
      totalSavedDisplay.textContent = totalCO2Saved.toFixed(1);

      // Calculate progress percentage relative to our 50kg goal
      let percentage = (totalCO2Saved / monthlyGoal) * 100;

      // Ensure the progress bar doesn't break out past 100% visually
      if (percentage > 100) {
        percentage = 100;
      }

      // Apply the percentage width directly to the CSS of the progress bar
      progressBar.style.width = percentage + '%';
    }

    // 4. Set up Event Listener for adding an action
    addBtn.addEventListener('click', function() {
      // Read the numeric value of the currently selected dropdown option
      const selectedValue = parseFloat(actionSelect.value);
      
      // Accumulate the value into our running total
      totalCO2Saved += selectedValue;
      
      // Update our interface with the new data
      updateUI();
    });

    // 5. Set up Event Listener to wipe state back to zero
    resetBtn.addEventListener('click', function() {
      // Double check with a standard browser confirmation dialog box
      const confirmReset = confirm("Are you sure you want to clear your current progress tracking data?");
      
      if (confirmReset) {
        totalCO2Saved = 0.0;
        updateUI();
      }
    });
  </script>
</body>
</html>
